<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER GRID: TERRITORY WAR</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #05060f;
            --terminal-green: #39ff14;
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff007f;
            --neon-yellow: #ffcc00;
            --grid-empty: #12141f;
            --panel-bg: rgba(8, 10, 22, 0.85);
            --border-glow: rgba(57, 255, 20, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ==================== ANIMATED BACKGROUND ==================== */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(57, 255, 20, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57, 255, 20, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            z-index: 0;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.7) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ==================== PANELS ==================== */
        .cyber-panel {
            border: 1px solid var(--border-glow);
            box-shadow:
                0 0 20px rgba(57, 255, 20, 0.08),
                inset 0 0 30px rgba(57, 255, 20, 0.03);
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 620px;
            width: 100%;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            transition: all 0.4s ease;
        }

        .cyber-panel:hover {
            border-color: rgba(57, 255, 20, 0.4);
            box-shadow:
                0 0 35px rgba(57, 255, 20, 0.12),
                inset 0 0 30px rgba(57, 255, 20, 0.04);
        }

        /* Panel top accent line */
        .cyber-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--terminal-green), transparent);
            border-radius: 2px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--terminal-green);
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.5), 0 0 40px rgba(57, 255, 20, 0.15);
            margin-top: 0;
            font-size: 22px;
            letter-spacing: 3px;
            font-weight: 700;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            margin-top: 0;
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .subtitle {
            color: #556;
            font-size: 13px;
            margin-top: 6px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(57, 255, 20, 0.3);
            color: var(--terminal-green);
            padding: 12px 16px;
            width: 85%;
            font-family: inherit;
            font-size: 16px;
            text-align: center;
            margin-bottom: 18px;
            outline: none;
            border-radius: 8px;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        input[type="text"]:focus {
            border-color: var(--terminal-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        input[type="text"]::placeholder {
            color: rgba(57, 255, 20, 0.3);
        }

        button {
            background: linear-gradient(135deg, var(--terminal-green), #20cc0a);
            color: #000;
            border: none;
            padding: 12px 28px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            margin: 5px;
            border-radius: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.6s;
        }

        button:hover::after {
            transform: rotate(45deg) translateX(100%);
        }

        button:hover {
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff3333, #cc1111) !important;
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3) !important;
        }

        .btn-danger:hover {
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.5) !important;
        }

        /* ==================== STATUS BAR ==================== */
        .status-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            background: rgba(10, 12, 25, 0.7);
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .p1-color {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        }

        .p2-color {
            color: var(--neon-magenta);
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
        }

        .p3-color {
            color: var(--terminal-green);
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
        }

        /* ==================== GRID ==================== */
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 3px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border: 1px solid rgba(57, 255, 20, 0.1);
            border-radius: 10px;
            width: 100%;
            max-width: 460px;
            aspect-ratio: 1;
            margin: 0 auto;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .cell {
            background-color: var(--grid-empty);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .cell:hover {
            filter: brightness(1.8);
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
            z-index: 1;
        }

        .cell.p1 {
            background-color: var(--neon-cyan);
            box-shadow: 0 0 6px var(--neon-cyan), inset 0 0 3px rgba(255,255,255,0.3);
            animation: cellPop 0.2s ease;
        }

        .cell.p2 {
            background-color: var(--neon-magenta);
            box-shadow: 0 0 6px var(--neon-magenta), inset 0 0 3px rgba(255,255,255,0.3);
            animation: cellPop 0.2s ease;
        }

        .cell.p3 {
            background-color: var(--terminal-green);
            box-shadow: 0 0 6px var(--terminal-green), inset 0 0 3px rgba(255,255,255,0.3);
            animation: cellPop 0.2s ease;
        }

        @keyframes cellPop {
            0% { transform: scale(0.5); opacity: 0.5; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        #timer {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: var(--neon-yellow);
            text-shadow: 0 0 12px rgba(255, 204, 0, 0.6);
            font-weight: 700;
        }

        .role-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            animation: badgePulse 2s ease-in-out infinite;
        }

        .role-badge.p1 {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: var(--neon-cyan);
        }
        .role-badge.p2 {
            background: rgba(255, 0, 127, 0.1);
            border: 1px solid rgba(255, 0, 127, 0.4);
            color: var(--neon-magenta);
        }
        .role-badge.p3 {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.4);
            color: var(--terminal-green);
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255,255,255,0.05); }
            50% { box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        }

        /* ==================== WINNER OVERLAY ==================== */
        #winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #winner-overlay.show {
            display: flex;
            animation: overlayFadeIn 0.5s ease;
        }

        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .winner-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            letter-spacing: 6px;
            color: #888;
            margin-bottom: 10px;
            animation: slideDown 0.6s ease 0.2s both;
        }

        .winner-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 8px;
            animation: winnerZoom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
        }

        .winner-name.p1-winner { color: var(--neon-cyan); text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(0,240,255,0.3); }
        .winner-name.p2-winner { color: var(--neon-magenta); text-shadow: 0 0 30px var(--neon-magenta), 0 0 60px rgba(255,0,127,0.3); }
        .winner-name.p3-winner { color: var(--terminal-green); text-shadow: 0 0 30px var(--terminal-green), 0 0 60px rgba(57,255,20,0.3); }
        .winner-name.tie-winner { color: var(--neon-yellow); text-shadow: 0 0 30px var(--neon-yellow), 0 0 60px rgba(255,204,0,0.3); }

        .winner-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: #aaa;
            letter-spacing: 3px;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease 0.7s both;
        }

        .winner-trophy {
            font-size: 80px;
            animation: trophyBounce 1s ease 0.5s both;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.5));
        }

        .winner-close-btn {
            margin-top: 30px;
            animation: slideDown 0.6s ease 1s both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes winnerZoom {
            from { opacity: 0; transform: scale(0.3); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes trophyBounce {
            0% { opacity: 0; transform: scale(0) rotate(-20deg); }
            60% { transform: scale(1.2) rotate(10deg); }
            80% { transform: scale(0.9) rotate(-5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            pointer-events: none;
            display: none;
        }

        /* ==================== SCOREBOARD IN WINNER ==================== */
        .final-scores {
            display: flex;
            gap: 30px;
            margin-top: 15px;
            animation: slideDown 0.6s ease 0.9s both;
        }

        .final-score-item {
            text-align: center;
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 90px;
        }

        .final-score-item .fs-name {
            font-size: 11px;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .final-score-item .fs-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        /* ==================== HISTORY PANEL ==================== */
        .history-item {
            border-bottom: 1px solid rgba(57, 255, 20, 0.08);
            padding: 10px 0;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(57, 255, 20, 0.02);
            padding-left: 8px;
        }

        .history-date {
            color: #555;
            font-size: 12px;
        }

        .history-winner-text {
            color: var(--terminal-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }

        .history-detail {
            color: #666;
            font-size: 12px;
            margin-top: 2px;
        }

        /* ==================== PLAYER WAITING DOTS ==================== */
        .waiting-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 500px) {
            .cyber-panel {
                padding: 18px;
                border-radius: 12px;
            }

            h1 {
                font-size: 16px;
                letter-spacing: 1px;
            }

            .grid {
                gap: 2px;
                padding: 6px;
            }

            .status-bar {
                flex-direction: column;
                gap: 6px;
                font-size: 13px;
            }

            .winner-name {
                font-size: 28px;
            }

            .final-scores {
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- Background layers -->
    <canvas id="bg-canvas"></canvas>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>
    <div class="vignette"></div>

    <!-- Winner Overlay -->
    <div id="winner-overlay">
        <div class="winner-trophy" id="winner-trophy">🏆</div>
        <div class="winner-title">SYSTEM TERMINATED — VICTORY DECLARED</div>
        <div class="winner-name" id="winner-name-display">PLAYER</div>
        <div class="winner-score" id="winner-score-display">SCORE: 0</div>

        <button class="winner-close-btn" onclick="closeWinnerOverlay()">RETURN TO GRID</button>
    </div>
    <canvas id="confetti-canvas"></canvas>

    <!-- Login Screen -->
    <div id="login-screen" class="cyber-panel" style="margin-top: 15vh;">
        <h1>⬡ ACCESSING THE MATRIX</h1>
        <p class="subtitle">ENTER YOUR CODENAME TO CONNECT (MAX 3 OPERATORS)</p>
        <input type="text" id="username-input" placeholder="CODENAME..." maxlength="10"
               onkeydown="if(event.key === 'Enter') joinGame()">
        <br>
        <button onclick="joinGame()">⚡ CONNECT</button>
        <p id="login-status" style="color: #ff3333; margin-top: 12px; font-weight: bold; font-size: 13px;"></p>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="cyber-panel" style="display: none;">
        <h1 style="margin-bottom: 5px;">⬡ CYBER GRID AREA WAR</h1>
        <div id="my-role-display" style="margin-bottom: 15px; margin-top: 10px;"></div>

        <div class="status-bar">
            <div>TIME: <span id="timer">45</span>s</div>
            <div id="game-state-text" style="color: #ff3333; font-weight: bold;">WAITING FOR PLAYERS<span class="waiting-dots"></span></div>
        </div>

        <div class="status-bar" style="font-size: 14px; font-weight: bold;">
            <div class="p1-color">P1: <span id="p1-name">-</span> (<span id="p1-score">0</span>)</div>
            <div class="p2-color">P2: <span id="p2-name">-</span> (<span id="p2-score">0</span>)</div>
            <div class="p3-color">P3: <span id="p3-name">-</span> (<span id="p3-score">0</span>)</div>
        </div>

        <div class="grid" id="pixel-grid"></div>

        <div style="margin-top: 20px;">
            <button id="start-btn" style="display: none;" onclick="startGame()">▶ START SYSTEM</button>
            <button id="reset-btn" class="btn-danger" style="display:none;" onclick="resetGame()">⟲ RESET ALL</button>
        </div>
    </div>

    <!-- Match History -->
    <div id="history-panel" class="cyber-panel" style="display: none;">
        <h2>📋 MATCH HISTORY LOG</h2>
        <div id="history-list" style="text-align: left; margin-top: 15px;">
            <div class="history-item" style="color:#555;">LOADING DATABASE...</div>
        </div>
    </div>

    <script>
        // ======================== 1. FIREBASE CONFIG ========================
        const firebaseConfig = {
            apiKey: "AIzaSyCY9c0cyUdjeZgAex7Si0DyXGAMZ_MY0OQ",
            authDomain: "iot1-6c032.firebaseapp.com",
            databaseURL: "https://iot1-6c032-default-rtdb.firebaseio.com",
            projectId: "iot1-6c032",
            storageBucket: "iot1-6c032.firebasestorage.app",
            messagingSenderId: "722774557899",
            appId: "1:722774557899:web:9595d70c69fb5cd62dc74e",
            measurementId: "G-QZT6V1NY0N"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ======================== 2. GAME VARIABLES ========================
        let mySlot = null;
        let myName = "";
        let gameState = "waiting";
        let winnerCalculated = false;
        let joinedTimestamp = 0; // เวลาที่เข้าเกม เพื่อกรอง resetSignal เก่า
        let syncReady = false; // ป้องกันการ reload ก่อน sync พร้อม
        const GRID_SIZE = 12;

        // สร้างตารางใน DOM
        const gridElement = document.getElementById('pixel-grid');
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.addEventListener('click', () => handleCellClick(r, c));
                gridElement.appendChild(cell);
            }
        }

        // ======================== 3. ANIMATED BACKGROUND ========================
        (function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const PARTICLE_COUNT = 60;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.size = Math.random() * 2 + 0.5;
                    this.alpha = Math.random() * 0.4 + 0.1;
                    this.color = ['#39ff14', '#00f0ff', '#ff007f'][Math.floor(Math.random() * 3)];
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.alpha;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(57, 255, 20, ' + (0.06 * (1 - dist / 120)) + ')';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                drawLines();
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ======================== 4. CONFETTI SYSTEM ========================
        function launchConfetti(winnerColor) {
            const canvas = document.getElementById('confetti-canvas');
            canvas.style.display = 'block';
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const colors = {
                'p1': ['#00f0ff', '#0088ff', '#00ccff', '#ffffff'],
                'p2': ['#ff007f', '#ff44aa', '#ff0055', '#ffffff'],
                'p3': ['#39ff14', '#00ff44', '#22cc00', '#ffffff'],
                'tie': ['#ffcc00', '#ff8800', '#ffff00', '#ffffff']
            };
            const palette = colors[winnerColor] || colors['tie'];

            let confettiPieces = [];
            for (let i = 0; i < 150; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 4 + 2,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 10,
                    alpha: 1
                });
            }

            let frame = 0;
            function drawConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                frame++;

                confettiPieces.forEach(c => {
                    c.x += c.vx;
                    c.y += c.vy;
                    c.vy += 0.05;
                    c.rotation += c.rotSpeed;

                    if (frame > 120) {
                        c.alpha -= 0.01;
                    }

                    ctx.save();
                    ctx.translate(c.x, c.y);
                    ctx.rotate((c.rotation * Math.PI) / 180);
                    ctx.globalAlpha = Math.max(0, c.alpha);
                    ctx.fillStyle = c.color;
                    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
                    ctx.restore();
                });

                if (frame < 250) {
                    requestAnimationFrame(drawConfetti);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    canvas.style.display = 'none';
                }
            }
            drawConfetti();
        }

        // ======================== 5. JOIN GAME ========================
        function joinGame() {
            const nameInput = document.getElementById('username-input').value.trim().toUpperCase();
            if (!nameInput) {
                document.getElementById('login-status').innerText = "⚠ ENTER A CODENAME!";
                return;
            }
            myName = nameInput;

            document.getElementById('login-status').innerText = "CONNECTING...";
            document.getElementById('login-status').style.color = "#ffcc00";

            // ลบ resetSignal เก่าก่อนเข้า (ป้องกัน signal ค้างจาก session ก่อน)
            db.ref('resetSignal').once('value').then((snap) => {
                // ดำเนินการ join ต่อ
                doJoinTransaction();
            }).catch(() => {
                // ถ้าอ่านไม่ได้ก็ลอง join เลย
                doJoinTransaction();
            });
        }

        function doJoinTransaction() {
            db.ref('slots').transaction((currentSlots) => {
                if (!currentSlots) currentSlots = { p1: "", p2: "", p3: "" };

                // ไม่ set mySlot ตรงนี้ เพราะ transaction อาจถูกเรียกซ้ำ
                if (!currentSlots.p1) { currentSlots.p1 = myName; }
                else if (!currentSlots.p2) { currentSlots.p2 = myName; }
                else if (!currentSlots.p3) { currentSlots.p3 = myName; }
                // ถ้าเต็มหมด ไม่แก้ไข

                return currentSlots;
            }, (error, committed, snapshot) => {
                if (error) {
                    document.getElementById('login-status').innerText = "⚠ CONNECTION ERROR";
                    document.getElementById('login-status').style.color = "#ff3333";
                    return;
                }

                if (!committed) {
                    document.getElementById('login-status').innerText = "⚠ CONNECTION ERROR - TRY AGAIN";
                    document.getElementById('login-status').style.color = "#ff3333";
                    return;
                }

                // ตรวจสอบ slot จาก committed snapshot (ปลอดภัยจาก retry)
                const slots = snapshot.val() || {};
                mySlot = null;
                if (slots.p1 === myName) mySlot = 'p1';
                else if (slots.p2 === myName) mySlot = 'p2';
                else if (slots.p3 === myName) mySlot = 'p3';

                if (mySlot) {
                    // บันทึกเวลาเข้าเกม
                    joinedTimestamp = Date.now();

                    db.ref(`slots/${mySlot}`).onDisconnect().remove();

                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                    document.getElementById('history-panel').style.display = 'block';

                    const roleDisplay = document.getElementById('my-role-display');
                    roleDisplay.innerHTML = `<span class="role-badge ${mySlot}">${mySlot.toUpperCase()} :: ${myName}</span>`;

                    setupSync();

                    // เปิด syncReady หลังจาก delay เล็กน้อย ให้ listeners ดึงค่าเริ่มต้นเสร็จก่อน
                    setTimeout(() => { syncReady = true; }, 2000);
                } else {
                    document.getElementById('login-status').innerText = "⛔ SERVER FULL (3/3)";
                    document.getElementById('login-status').style.color = "#ff3333";
                }
            });
        }

        // ======================== 6. REAL-TIME SYNC ========================
        function setupSync() {
            // --- ฟังสัญญาณ Reset จาก Host ---
            let resetListenerFirstCall = true;
            db.ref('resetSignal').on('value', (snapshot) => {
                // ข้ามค่าแรกที่ listener ดึงมาตอนเริ่มต้น (อาจเป็น signal เก่า)
                if (resetListenerFirstCall) {
                    resetListenerFirstCall = false;
                    return;
                }

                const signal = snapshot.val();
                if (signal && signal.timestamp) {
                    // ถ้าเราไม่ใช่ Host (P1) ให้กลับไปหน้า Login
                    if (mySlot !== 'p1') {
                        // ลบ slot ของตัวเอง
                        if (mySlot) {
                            db.ref(`slots/${mySlot}`).remove();
                        }
                        // Reload ไปหน้า Login
                        window.location.reload();
                    }
                }
            });

            // --- ซิงค์รายชื่อผู้เล่น ---
            db.ref('slots').on('value', (snapshot) => {
                const slots = snapshot.val() || {};
                document.getElementById('p1-name').innerText = slots.p1 || '-';
                document.getElementById('p2-name').innerText = slots.p2 || '-';
                document.getElementById('p3-name').innerText = slots.p3 || '-';

                // ตรวจสอบว่า Slot ของเรายังอยู่ไหม (กรณีถูก Reset โดย Host)
                // ต้องรอ syncReady ก่อน ป้องกันเด้งตอนเริ่ม
                if (syncReady && mySlot && !slots[mySlot]) {
                    window.location.reload();
                    return;
                }

                // สิทธิ์ Host P1 — เห็นปุ่ม Start เมื่อครบ 3 คน
                if (mySlot === 'p1' && slots.p1 && slots.p2 && slots.p3 && gameState === 'waiting') {
                    document.getElementById('start-btn').style.display = 'inline-block';
                } else {
                    document.getElementById('start-btn').style.display = 'none';
                }

                // P1 เห็นปุ่ม Reset เสมอ
                if (mySlot === 'p1') {
                    document.getElementById('reset-btn').style.display = 'inline-block';
                }
            });

            // --- ซิงค์สถานะเกมและเวลา ---
            db.ref('gameStatus').on('value', (snapshot) => {
                const data = snapshot.val() || { state: 'waiting', timer: 45 };
                gameState = data.state;
                document.getElementById('timer').innerText = data.timer;

                const stateText = document.getElementById('game-state-text');
                if (gameState === 'waiting') {
                    stateText.innerHTML = 'WAITING FOR PLAYERS<span class="waiting-dots"></span>';
                    stateText.style.color = "#ff3333";
                    winnerCalculated = false;
                } else if (gameState === 'playing') {
                    stateText.innerText = "⚡ CAPTURE THE GRID!";
                    stateText.style.color = "#39ff14";
                    winnerCalculated = false;
                } else if (gameState === 'ended') {
                    stateText.innerText = "CALCULATING WINNER...";
                    stateText.style.color = "#ffcc00";
                    if (!winnerCalculated) {
                        winnerCalculated = true;
                        // Small delay for suspense
                        setTimeout(() => calculateWinner(), 800);
                    }
                }
            });

            // --- ซิงค์กระดานสี ---
            db.ref('grid').on('value', (snapshot) => {
                const gridData = snapshot.val() || {};
                const cells = document.querySelectorAll('.cell');

                cells.forEach(cell => {
                    const key = `${cell.dataset.row}_${cell.dataset.col}`;
                    const owner = gridData[key];
                    const currentClass = cell.classList.contains('p1') ? 'p1' :
                                         cell.classList.contains('p2') ? 'p2' :
                                         cell.classList.contains('p3') ? 'p3' : null;

                    if (owner !== currentClass) {
                        cell.className = 'cell';
                        if (owner) {
                            cell.classList.add(owner);
                        }
                    }
                });

                updateScores(gridData);
            });

            // --- ซิงค์ประวัติการแข่งขัน (5 แมตช์ล่าสุด) ---
            db.ref('matchHistory').limitToLast(5).on('value', (snapshot) => {
                const historyList = document.getElementById('history-list');
                historyList.innerHTML = '';

                const data = snapshot.val();
                if (data) {
                    const matches = Object.values(data).reverse();
                    matches.forEach((match) => {
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.innerHTML = `
                            <div class="history-date">${match.dateStr || 'N/A'}</div>
                            <div class="history-winner-text">🏆 ${match.winner || 'UNKNOWN'}</div>
                            <div class="history-detail">
                                P1(${match.players?.p1?.name || '?'}): ${match.players?.p1?.score || 0}
                                &nbsp;|&nbsp; P2(${match.players?.p2?.name || '?'}): ${match.players?.p2?.score || 0}
                                &nbsp;|&nbsp; P3(${match.players?.p3?.name || '?'}): ${match.players?.p3?.score || 0}
                            </div>
                        `;
                        historyList.appendChild(item);
                    });
                } else {
                    historyList.innerHTML = '<div class="history-item" style="color:#555;">NO RECORDS FOUND...</div>';
                }
            });
        }

        // ======================== 7. GAMEPLAY LOGIC ========================
        function handleCellClick(row, col) {
            if (gameState !== 'playing') return;
            const key = `${row}_${col}`;
            db.ref(`grid/${key}`).set(mySlot);
        }

        function updateScores(gridData) {
            let p1Count = 0, p2Count = 0, p3Count = 0;

            for (let key in gridData) {
                if (gridData[key] === 'p1') p1Count++;
                if (gridData[key] === 'p2') p2Count++;
                if (gridData[key] === 'p3') p3Count++;
            }

            document.getElementById('p1-score').innerText = p1Count;
            document.getElementById('p2-score').innerText = p2Count;
            document.getElementById('p3-score').innerText = p3Count;
        }

        function startGame() {
            db.ref('grid').remove();
            db.ref('gameStatus').set({ state: 'playing', timer: 45 });

            let timeLeft = 45;
            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    db.ref('gameStatus').set({ state: 'ended', timer: 0 });
                } else {
                    db.ref('gameStatus/timer').set(timeLeft);
                }
            }, 1000);
        }

        // ======================== 8. WINNER CALCULATION ========================
        function calculateWinner() {
            const s1 = parseInt(document.getElementById('p1-score').innerText) || 0;
            const s2 = parseInt(document.getElementById('p2-score').innerText) || 0;
            const s3 = parseInt(document.getElementById('p3-score').innerText) || 0;
            const n1 = document.getElementById('p1-name').innerText;
            const n2 = document.getElementById('p2-name').innerText;
            const n3 = document.getElementById('p3-name').innerText;

            let max = Math.max(s1, s2, s3);
            let winnerText = "";
            let winnerName = "";
            let winnerSlot = "tie";
            let winnerScore = 0;

            if (max === 0) {
                winnerText = "NO ONE CAPTURED ANY GRID";
                winnerName = "NO WINNER";
                winnerSlot = "tie";
            } else if (max === s1 && max !== s2 && max !== s3) {
                winnerText = `WINNER: ${n1} (P1)`;
                winnerName = n1;
                winnerSlot = "p1";
                winnerScore = s1;
            } else if (max === s2 && max !== s1 && max !== s3) {
                winnerText = `WINNER: ${n2} (P2)`;
                winnerName = n2;
                winnerSlot = "p2";
                winnerScore = s2;
            } else if (max === s3 && max !== s1 && max !== s2) {
                winnerText = `WINNER: ${n3} (P3)`;
                winnerName = n3;
                winnerSlot = "p3";
                winnerScore = s3;
            } else {
                winnerText = "TIE DETECTED!";
                winnerName = "IT'S A TIE!";
                winnerSlot = "tie";
            }

            document.getElementById('game-state-text').innerText = `🔥 ${winnerText} 🔥`;

            // แสดง Winner Overlay Animation
            showWinnerOverlay(winnerName, winnerSlot, winnerScore, s1, s2, s3, n1, n2, n3);

            // P1 บันทึกประวัติ
            if (mySlot === 'p1') {
                if (!window.hasSavedHistory) {
                    window.hasSavedHistory = true;
                    const matchRecord = {
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        dateStr: new Date().toLocaleString('th-TH'),
                        winner: winnerText,
                        players: {
                            p1: { name: n1, score: s1 },
                            p2: { name: n2, score: s2 },
                            p3: { name: n3, score: s3 }
                        }
                    };
                    db.ref('matchHistory').push(matchRecord);
                    setTimeout(() => { window.hasSavedHistory = false; }, 5000);
                }
            }
        }

        // ======================== 9. WINNER OVERLAY ========================
        function showWinnerOverlay(name, slot, score, s1, s2, s3, n1, n2, n3) {
            const overlay = document.getElementById('winner-overlay');
            const nameDisplay = document.getElementById('winner-name-display');
            const scoreDisplay = document.getElementById('winner-score-display');
            const scoresContainer = document.getElementById('final-scores-container');

            // Set winner name
            nameDisplay.innerText = name;
            nameDisplay.className = 'winner-name ' + slot + '-winner';

            // Set winner score
            if (slot === 'tie') {
                scoreDisplay.innerText = 'DRAW MATCH';
            } else {
                scoreDisplay.innerText = `TERRITORY CAPTURED: ${score} CELLS`;
            }

            // Final scores breakdown
            scoresContainer.innerHTML = `
                <div class="final-score-item">
                    <div class="fs-name p1-color">${n1}</div>
                    <div class="fs-val p1-color">${s1}</div>
                </div>
                <div class="final-score-item">
                    <div class="fs-name p2-color">${n2}</div>
                    <div class="fs-val p2-color">${s2}</div>
                </div>
                <div class="final-score-item">
                    <div class="fs-name p3-color">${n3}</div>
                    <div class="fs-val p3-color">${s3}</div>
                </div>
            `;

            overlay.classList.add('show');
            launchConfetti(slot);
        }

        function closeWinnerOverlay() {
            document.getElementById('winner-overlay').classList.remove('show');
        }

        // ======================== 10. RESET GAME ========================
        function resetGame() {
            if (confirm("⚠ RESET ALL: ล้างผู้เล่นทั้งหมดและเริ่มใหม่?\n(ประวัติการแข่งขันจะไม่ถูกลบ)")) {
                // ส่งสัญญาณ Reset ไปให้ทุกคน
                db.ref('resetSignal').set({
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    by: mySlot
                }).then(() => {
                    // ลบข้อมูลชั่วคราว
                    db.ref('slots').remove();
                    db.ref('grid').remove();
                    db.ref('gameStatus').remove();
                    // ลบสัญญาณ reset หลังจากส่งแล้ว (delay เล็กน้อยให้คนอื่นรับทัน)
                    setTimeout(() => {
                        db.ref('resetSignal').remove();
                        window.location.reload();
                    }, 1500);
                });
            }
        }
    </script>
